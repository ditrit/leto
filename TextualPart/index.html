<!DOCTYPE html>
<html>
<head>
  <title>My first Vue app</title>
  <script src="https://unpkg.com/vue"></script>
  <script src="../index.mjs"></script>
</head>
<body>
  <div id="app">
    <p>{{ message }}</p>
    <textarea id="val" v-model="input" cols="40" rows="30"></textarea>
    </br>
    <button v-on:click="text">Parse</button>
    <div id="tableWrapper"></div>
  </div>

  <script>
    var app = new Vue({
      el: '#app',
      data: {
        message: 'Textual Part'
      },
      methods: {
        text: function(event) {
          const input = document.getElementById('val').value
          const tableWrapper = document.getElementById("tableWrapper") 
          tableWrapper.innerHTML = Index.lancement(input)
          alert(input)
        }
      }
    })
  </script>
</body>
</html>
